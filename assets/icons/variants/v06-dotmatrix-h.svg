<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="currentColor">
    <title>heimdall-dotmatrix-h-control</title>
    <!-- 5-row dot-matrix H monogram — control variant per brief -->
    <!-- Expected to fail the 16x16 gate (dots merge into a blob). -->
