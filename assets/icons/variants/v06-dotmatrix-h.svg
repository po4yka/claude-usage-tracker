    <circle cx="28" cy="20" r="6"/>
    <circle cx="28" cy="36" r="6"/>
    <circle cx="28" cy="52" r="6"/>
    <circle cx="28" cy="68" r="6"/>
    <circle cx="28" cy="84" r="6"/>
    <!-- crossbar -->
    <circle cx="44" cy="52" r="6"/>
    <circle cx="60" cy="52" r="6"/>
    <!-- right column -->
    <circle cx="76" cy="20" r="6"/>
    <circle cx="76" cy="36" r="6"/>
    <circle cx="76" cy="52" r="6"/>
    <circle cx="76" cy="68" r="6"/>
    <circle cx="76" cy="84" r="6"/>
  </g>
</svg>
