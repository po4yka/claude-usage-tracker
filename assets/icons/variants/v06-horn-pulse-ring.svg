<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g>
    <title>heimdall-horn-pulse-ring</title>
    <!-- Horn compacted so the pulse arc fits beside the bell. -->
    <path d="M 18 40
             Q 34 32 48 28
             Q 62 22 76 22
             L 76 78
             Q 62 78 48 72
             Q 34 68 18 60 Z"
          fill="currentColor"/>
    <!-- Pulse arc from (86,40) to (86,60), r=10, center (82,50).
         Subtends ~106° (< 180°) → large-arc-flag=0.
         Drawn clockwise on screen → sweep-flag=1. -->
    <path d="M 86 40 A 10 10 0 0 1 86 60"
          fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
