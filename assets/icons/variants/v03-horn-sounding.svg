<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g>
    <title>heimdall-horn-sounding</title>
    <!-- Compacted horn to leave room for emission rays beyond the bell. -->
    <path d="M 18 40
             Q 34 32 48 28
             Q 62 22 72 22
             L 72 78
             Q 62 78 48 72
             Q 34 68 18 60 Z"
          fill="currentColor"/>
    <!-- Three emission rays fanning from the bell rim. -->
    <line x1="76" y1="32" x2="94" y2="22"
          stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
    <line x1="76" y1="50" x2="96" y2="50"
          stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
    <line x1="76" y1="68" x2="94" y2="78"
          stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
    <!-- accent pip on the middle ray terminus — "alert fired" -->
    <circle cx="94" cy="50" r="3" fill="#D71921"/>
  </g>
</svg>
