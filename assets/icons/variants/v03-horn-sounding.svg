<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g>
    <title>heimdall-horn-sounding</title>
    <!-- horn body (tighter to leave room for emission rays at right) -->
    <path d="M 16 74
             Q 10 50 22 32
             Q 38 18 56 22
             Q 70 26 70 40
             L 70 48
             Q 60 48 58 40
             Q 54 30 42 30
             Q 28 32 22 50
             Q 18 64 26 72 Z"
          fill="currentColor"/>
    <!-- 3 emission rays from bell — "the horn sounds" -->
    <line x1="76" y1="30" x2="92" y2="22" stroke="currentColor" stroke-width="9" stroke-linecap="round"/>
    <line x1="80" y1="44" x2="96" y2="44" stroke="currentColor" stroke-width="9" stroke-linecap="round"/>
    <line x1="76" y1="58" x2="92" y2="66" stroke="currentColor" stroke-width="9" stroke-linecap="round"/>
    <!-- accent pip on the middle ray tip -->
    <circle cx="94" cy="44" r="3" fill="#D71921"/>
  </g>
</svg>
