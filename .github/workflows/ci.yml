name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, "1.89"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  check_release_binaries_build:
    name: Release binary build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: |
          cargo build --release \
            --bin claude-usage-tracker \
            --bin heimdall-hook

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: ./node_modules/.bin/tsc --noEmit
