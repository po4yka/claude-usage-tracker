<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Usage Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts@4/dist/apexcharts.min.js"></script>
<style>
/* __STYLE_CSS__ */
</style>
</head>
<body>
<header>
  <h1>Claude Code Usage Dashboard <span id="plan-badge" style="display:none;font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(217,119,87,0.15);color:var(--accent);vertical-align:middle;margin-left:8px"></span></h1>
  <div class="meta" id="meta">Loading...</div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme">
      <span id="theme-icon">&#x263E;</span>
    </button>
    <button id="rescan-btn" onclick="triggerRescan()" title="Rebuild the database from scratch">&#x21bb; Rescan</button>
  </div>
</header>

<div id="filter-bar">
  <div class="filter-label">Models</div>
  <div id="model-checkboxes"></div>
  <button class="filter-btn" onclick="selectAllModels()">All</button>
  <button class="filter-btn" onclick="clearAllModels()">None</button>
  <div class="filter-sep"></div>
  <div class="filter-label">Range</div>
  <div class="range-group">
    <button class="range-btn" data-range="7d"  onclick="setRange('7d')">7d</button>
    <button class="range-btn" data-range="30d" onclick="setRange('30d')">30d</button>
    <button class="range-btn" data-range="90d" onclick="setRange('90d')">90d</button>
    <button class="range-btn" data-range="all" onclick="setRange('all')">All</button>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-label">Project</div>
  <input type="text" id="project-search" placeholder="Filter by project..." oninput="onProjectSearch(this.value)" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;font-size:12px;width:180px;outline:none;">
  <button class="filter-btn" id="project-clear-btn" onclick="clearProjectSearch()" style="display:none">Clear</button>
</div>

<div class="container">
  <div class="stats-row" id="usage-windows" style="display:none"></div>
  <div class="stats-row" id="stats-row"></div>
  <div id="cost-sparkline" style="display:none;margin-bottom:16px"></div>
  <div class="charts-grid">
    <div class="chart-card wide">
      <h2 id="daily-chart-title">Daily Token Usage</h2>
      <div class="chart-wrap tall"><div id="chart-daily"></div></div>
    </div>
    <div class="chart-card">
      <h2>By Model</h2>
      <div class="chart-wrap"><div id="chart-model"></div></div>
    </div>
    <div class="chart-card">
      <h2>Top Projects by Tokens</h2>
      <div class="chart-wrap"><div id="chart-project"></div></div>
    </div>
  </div>
  <div class="table-card" id="subagent-summary" style="display:none"></div>
  <div class="table-card" id="entrypoint-breakdown" style="display:none"></div>
  <div class="table-card" id="service-tiers" style="display:none"></div>
  <div id="model-cost-mount"></div>
  <div id="sessions-mount"></div>
  <div id="project-cost-mount"></div>
</div>

<footer>
  <div class="footer-content">
    <p>Cost estimates based on Anthropic API pricing (<a href="https://docs.anthropic.com/en/docs/about-claude/pricing" target="_blank">docs.anthropic.com/pricing</a>). Actual costs for Max/Pro subscribers differ.</p>
    <p>GitHub: <a href="https://github.com/po4yka/claude-usage-tracker" target="_blank">po4yka/claude-usage-tracker</a> &middot; License: MIT</p>
  </div>
</footer>

<script>
/* __APP_JS__ */
</script>
</body>
</html>
